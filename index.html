<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civ Strategy Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: #4ecdc4; margin-bottom: 20px; }
        .version-selector { background: #16213e; padding: 15px; margin-bottom: 20px; border-radius: 10px; }
        .version-selector select { width: 100%; padding: 10px; font-size: 16px; border: none; border-radius: 5px; background: #0f3460; color: white; }
        .game-area { background: #16213e; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .map { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin: 20px 0; }
        .cell { width: 50px; height: 50px; background: #0f3460; border: 1px solid #1a1a2e; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .cell:hover { background: #4ecdc4; color: #1a1a2e; }
        .resources { display: flex; gap: 20px; margin: 20px 0; }
        .resource { background: #1a1a2e; padding: 15px; border-radius: 5px; min-width: 120px; }
        .resource span { display: block; color: #4ecdc4; font-size: 14px; }
        .resource strong { font-size: 24px; }
        .controls { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        button { padding: 10px 20px; background: #4ecdc4; color: #1a1a2e; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
        button:hover { background: #45b7d1; }
        .log { background: #0f0f23; padding: 15px; border-radius: 5px; margin-top: 20px; max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; }
        .message { background: #4ecdc4; color: #1a1a2e; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .boss-announcement { background: #e94560; color: white; padding: 20px; margin: 20px 0; border-radius: 10px; text-align: center; display: none; }
        @media (max-width: 768px) { .map { grid-template-columns: repeat(8, 1fr); } .cell { width: 40px; height: 40px; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏛️ Civilization Strategy Game</h1>

        <div class="version-selector">
            <strong>📊 Version Selector:</strong> 
            <select id="versionSelect" onchange="switchVersion()">
                <option value="v1.0.0">v1.0.0 - Current (Week 1)</option>
            </select>
        </div>

        <div id="bossAnnouncement" class="boss-announcement">
            <h2>👹 BOSS CIVILIZATION APPROACHING!</h2>
            <p id="bossName">Enemy Civilization: Unknown</p>
        </div>

        <div class="game-area">
            <h2>🎮 Game Status</h2>
            <div class="resources">
                <div class="resource"><span>🏰 Cities</span><strong id="cityCount">0</strong></div>
                <div class="resource"><span>⚔️ Power</span><strong id="powerCount">0</strong></div>
                <div class="resource"><span>🌍 Territory</span><strong id="territoryCount">0</strong></div>
                <div class="resource"><span>⭐ Story Progress</span><strong id="storyProgress">0/10</strong></div>
            </div>

            <div class="controls">
                <button onclick="nextTurn()">➡️ Next Turn</button>
                <button onclick="recruitPowerUp()">🎁 Power-Up</button>
                <button onclick="advanceStory()">📖 Story Chapter</button>
                <button onclick="checkBoss()">👹 Check for Boss</button>
                <button onclick="saveProgress()">💾 Save</button>
            </div>

            <div id="gameLog" class="log">
                <p>🎮 Game initialized. Select a version to begin!</p>
            </div>
        </div>

        <div class="game-area">
            <h2>🗺️ World Map (10x10)</h2>
            <div id="map" class="map"></div>
        </div>
    </div>

    <script>
        let currentVersion = "v1.0.0";
        let cities = 0;
        let power = 0;
        let territory = 0;
        let storyProgress = 0;
        let map = [];

        function initMap() {
            map = [];
            for (let i = 0; i < 100; i++) {
                map.push({
                    type: Math.random() > 0.7 ? "mountain" : "grassland",
                    city: false,
                    resource: Math.random() > 0.8 ? "gold" : "none"
                });
            }
            renderMap();
        }

        function renderMap() {
            const mapEl = document.getElementById("map");
            mapEl.innerHTML = "";
            map.forEach(function(cell, index) {
                const cellEl = document.createElement("div");
                cellEl.className = "cell";
                cellEl.innerHTML = cell.type === "mountain" ? "⛰️" : cell.city ? "🏰" : "🌱";
                if (cell.resource === "gold") cellEl.innerHTML += " ⚜️";
                mapEl.appendChild(cellEl);
            });
        }

        function nextTurn() {
            log("🎮 Turn advanced...");
            power += Math.floor(Math.random() * 3) + 1;
            territory += Math.floor(Math.random() * 2);
            if (Math.random() > 0.7) cities++;
            updateStatus();
        }

        function recruitPowerUp() {
            const powerUps = ["⚔️ Warrior", "🏹 Archer", "🛡️ Fortress", "🔥 Cannon", "📜 Library"];
            const powerUp = powerUps[Math.floor(Math.random() * powerUps.length)];
            power += 5;
            log("🎁 Recruited: " + powerUp);
            updateStatus();
        }

        function advanceStory() {
            storyProgress = Math.min(storyProgress + 1, 10);
            log("📖 Story chapter " + storyProgress + " unlocked!");
            updateStatus();
        }

        function checkBoss() {
            if (Math.random() > 0.3) {
                const bosses = ["👹 Barbarian Horde", "👹 Ancient Empire", "👹 Dark Kingdom", "👹 Techno-Mages", "👹 Space Colonizers"];
                const boss = bosses[Math.floor(Math.random() * bosses.length)];
                document.getElementById("bossName").textContent = "Enemy Civilization: " + boss;
                document.getElementById("bossAnnouncement").style.display = "block";
                power -= 10;
                log("⚠️ Boss " + boss + " appears! -10 Power!");
                updateStatus();
            } else {
                log("✅ No boss this turn");
            }
        }

        function updateStatus() {
            document.getElementById("cityCount").textContent = cities;
            document.getElementById("powerCount").textContent = power;
            document.getElementById("territoryCount").textContent = territory;
            document.getElementById("storyProgress").textContent = storyProgress + "/10";
        }

        function log(msg) {
            const logEl = document.getElementById("gameLog");
            logEl.innerHTML = msg + "<br>" + logEl.innerHTML;
        }

        function saveProgress() {
            const data = {
                version: currentVersion,
                cities: cities,
                power: power,
                territory: territory,
                storyProgress: storyProgress,
                map: JSON.stringify(map)
            };
            localStorage.setItem("civ_save", JSON.stringify(data));
            log("💾 Saved to " + currentVersion);
        }

        function switchVersion() {
            const selector = document.getElementById("versionSelect");
            currentVersion = selector.value;
            log("🔄 Switched to version: " + currentVersion);
        }

        window.onload = function() {
            initMap();
            updateStatus();
            // Load saved versions
            const versions = ["v1.0.0"];
            versions.forEach(function(v) {
                const saved = localStorage.getItem("civ_version_" + v);
                if (saved) {
                    const select = document.getElementById("versionSelect");
                    const option = document.createElement("option");
                    option.value = v;
                    option.textContent = v;
                    select.appendChild(option);
                }
            });
        };
    </script>
</body>
</html>
